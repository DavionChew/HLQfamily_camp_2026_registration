<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Camp Check-in жК•еИ∞</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{ --blue:#1a73e8; --green:#2e7d32; --amber:#f9a825; --red:#c62828; --bg:#0f1115; --card:#1b1f27; --line:#2a2f3a; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:-apple-system,Segoe UI,Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
        background:var(--bg); color:#e8eaed; }
  header{ background:var(--blue); color:#fff; padding:10px 14px; display:flex; align-items:center; gap:8px;
          position:sticky; top:0; z-index:5; }
  header b{ font-size:16px; } header .who{ margin-left:auto; font-size:12px; opacity:.85; }
  .wrap{ padding:12px; max-width:560px; margin:0 auto; }
  select,input,button{ font-size:16px; }
  select,input{ width:100%; padding:12px; border-radius:10px; border:1px solid var(--line);
                background:var(--card); color:#fff; margin:6px 0; }
  label{ font-size:12px; color:#9aa0a6; text-transform:uppercase; letter-spacing:.04em; }
  .btn{ display:block; width:100%; padding:14px; border:0; border-radius:12px; background:var(--blue); color:#fff;
        font-weight:700; margin:8px 0; cursor:pointer; }
  .btn.gray{ background:#3c4250; } .btn.green{ background:var(--green); } .btn.red{ background:var(--red); }
  .halls{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:8px 0; }
  .hall{ padding:16px 6px; text-align:center; border-radius:12px; background:var(--card); border:2px solid var(--line);
         font-weight:700; cursor:pointer; }
  .hall.sel{ border-color:var(--green); background:#16321c; }
  #reader{ width:100%; border-radius:12px; overflow:hidden; background:#000; }
  .card{ border-radius:14px; padding:16px; margin:10px 0; background:var(--card); border:1px solid var(--line); }
  .result{ text-align:center; }
  .result.ok{ background:#16321c; border-color:var(--green); }
  .result.dup{ background:#3a2f12; border-color:var(--amber); }
  .result.err{ background:#3a1717; border-color:var(--red); }
  .result .nm{ font-size:26px; font-weight:800; margin:4px 0; }
  .result .sub{ font-size:14px; color:#cfd3da; }
  .room{ font-size:40px; font-weight:900; margin:8px 0; letter-spacing:.02em; }
  .pill{ display:inline-block; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:700; margin:2px; }
  .pill.bus{ background:#0d3b66; } .pill.org{ background:#5b2a86; } .pill.hall{ background:#0c5d4a; }
  .recent .row{ display:flex; gap:8px; font-size:13px; padding:6px 0; border-bottom:1px solid var(--line); }
  .recent .row .t{ color:#9aa0a6; width:62px; } .recent .row .s{ margin-left:auto; }
  .muted{ color:#9aa0a6; font-size:13px; }
  .overlay{ position:fixed; inset:0; background:rgba(10,12,16,.96); z-index:20; padding:16px; overflow:auto; }
  table{ width:100%; border-collapse:collapse; font-size:14px; }
  td,th{ padding:8px 6px; border-bottom:1px solid var(--line); text-align:left; }
  th{ color:#9aa0a6; font-weight:600; } td.n{ text-align:right; font-variant-numeric:tabular-nums; }
  .bar{ height:6px; border-radius:4px; background:#2a2f3a; overflow:hidden; margin-top:3px; }
  .bar > i{ display:block; height:100%; background:var(--green); }
  .tabs{ display:flex; gap:6px; margin:8px 0; }
  .tabs .btn{ margin:0; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="overlay">
  <div class="wrap">
    <h2>рЯПХ Camp Check-in жК•еИ∞з≥їзїЯ</h2>
    <p class="muted">Organiser sign-in ¬Ј еРМеЈ•зЩїељХ</p>
    <label>Your name дљ†зЪДеРНе≠Ч</label>
    <input id="orgName" placeholder="e.g. David">
    <label>Passcode еѓЖз†Б</label>
    <input id="orgPass" type="password" placeholder="passcode">
    <button class="btn" onclick="doLogin()">Enter ињЫеЕ•</button>
    <p id="loginErr" class="muted" style="color:#ff8a80"></p>
  </div>
</div>

<header>
  <b>рЯПХ Check-in</b>
  <span class="who" id="who"></span>
</header>

<div class="wrap">
  <label>Checkpoint ељУеЙНзОѓиКВ</label>
  <select id="cp" onchange="onCpChange()"></select>

  <!-- hall selector (seminar only) -->
  <div id="hallBox" style="display:none">
    <label>Which hall? еУ™дЄ™иЃ≤еЇІеОЕ</label>
    <div class="halls" id="halls"></div>
  </div>

  <div class="tabs">
    <button class="btn" id="camBtn" onclick="toggleCam()">рЯУЈ Start camera еЉАеІЛжЙЂжПП</button>
    <button class="btn gray" onclick="openStats()">рЯУК Stats</button>
    <button class="btn gray" onclick="openLookup()">рЯФО жЯ•иѓҐ</button>
  </div>

  <div id="reader"></div>

  <!-- result -->
  <div id="resultBox"></div>

  <!-- manual -->
  <div class="card">
    <label>Manual жЙЛеК®иЊУеЕ• (ID or name)</label>
    <input id="manualQ" placeholder="C001 or nameвА¶" oninput="manualSearchDebounced()">
    <div id="manualResults"></div>
  </div>

  <div class="card recent">
    <label>Recent жЬАињС</label>
    <div id="recent"><span class="muted">No scans yet.</span></div>
  </div>
</div>

<!-- LOOKUP overlay -->
<div id="lookupOv" class="overlay" style="display:none">
  <div class="wrap">
    <button class="btn gray" onclick="closeLookup()">вЬХ Close</button>
    <h3>рЯФО жЯ•иѓҐ Lookup</h3>
    <input id="lookupQ" placeholder="ID / еРНе≠Ч / еИЖзїДвА¶" oninput="lookupDebounced()">
    <div id="lookupBody"><span class="muted">иЊУеЕ• IDгАБеРНе≠ЧжИЦеИЖзїДдї•жЯ•иѓҐ</span></div>
  </div>
</div>

<!-- STATS overlay -->
<div id="statsOv" class="overlay" style="display:none">
  <div class="wrap">
    <button class="btn gray" onclick="closeStats()">вЬХ Close</button>
    <h3>рЯУК Live stats</h3>
    <div id="statsBody"><span class="muted">LoadingвА¶</span></div>
  </div>
</div>

<script>
// ====================================================================
//  вђЗвђЗвђЗ  SET THIS ONCE  вђЗвђЗвђЗ
//  Paste your Apps Script Web app URL (Deploy > Manage deployments, ends /exec).
//  When you redeploy a NEW VERSION of the same deployment, this URL stays the same.
// ====================================================================
var API_URL = "https://script.google.com/macros/s/AKfycbz1y8SEHVHxTgN26QoAMgJxct1LYZ0y4EjOWF38V86EUfwJzpVC02xju2Uzr1e1Ig7e/exec";

var CFG=null, html5=null, scanning=false, lastCode='', lastAt=0, selectedHall='';
function $(id){ return document.getElementById(id); }
// fetch wrapper вАФ text/plain body avoids a CORS preflight that Apps Script can't handle
function apiCall(action, params){
  var body=JSON.stringify(Object.assign({action:action}, params||{}));
  return fetch(API_URL, {method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:body})
    .then(function(r){ return r.json(); });
}
// keep the same call names used below
function gcall(fn, arg){
  var map={getConfig:'config', getStats:'stats', recordScan:'scan', manualSearch:'search', undoScan:'undo', lookupPerson:'lookup'};
  return apiCall(map[fn], arg);
}
function save(k,v){ try{ localStorage.setItem(k,v);}catch(e){} }
function load(k){ try{ return localStorage.getItem(k)||'';}catch(e){ return ''; } }

// ---------- login ----------
window.onload=function(){
  $('orgName').value=load('orgName');
  if(load('pass')){ $('orgPass').value=load('pass'); }
  gcall('getConfig').then(function(c){ CFG=c; buildCp(); buildHalls();
    if(load('pass') && load('orgName')) doLogin(true);
  }).catch(function(){ $('loginErr').textContent='Cannot reach the server вАФ check API_URL / internet.'; });
};
function doLogin(silent){
  var name=$('orgName').value.trim(), pass=$('orgPass').value.trim();
  if(!name||!pass){ if(!silent) $('loginErr').textContent='Enter name and passcode.'; return; }
  gcall('getStats',{pass:pass}).then(function(r){
    if(r && r.ok){ save('orgName',name); save('pass',pass);
      $('who').textContent=name; $('login').style.display='none'; }
    else { $('loginErr').textContent='Wrong passcode еѓЖз†БйФЩиѓѓ'; }
  }).catch(function(){ $('loginErr').textContent='Network error, retry.'; });
}

// ---------- checkpoint + halls ----------
function buildCp(){ var s=$('cp'); s.innerHTML='';
  CFG.checkpoints.forEach(function(c){ var o=document.createElement('option');
    o.value=c.key; o.textContent=c.label+(c.when?'  ¬Ј  '+c.when:''); s.appendChild(o); });
  var saved=load('cp'); if(saved) s.value=saved; onCpChange(); }
function curCp(){ var k=$('cp').value; return CFG.checkpoints.find(function(c){return c.key===k;}); }
function onCpChange(){ save('cp',$('cp').value);
  $('hallBox').style.display = (curCp()&&curCp().type==='hall')?'block':'none'; }
function buildHalls(){ var h=$('halls'); h.innerHTML='';
  CFG.halls.forEach(function(name){ var d=document.createElement('div'); d.className='hall'; d.textContent=name;
    d.onclick=function(){ selectedHall=name; [].forEach.call(h.children,function(c){c.classList.remove('sel');});
      d.classList.add('sel'); }; h.appendChild(d); }); }

// ---------- camera ----------
function toggleCam(){ scanning?stopCam():startCam(); }
function startCam(){
  html5 = html5 || new Html5Qrcode('reader');
  html5.start({facingMode:'environment'}, {fps:10, qrbox:{width:240,height:240}},
    onDecode, function(){}).then(function(){ scanning=true; $('camBtn').textContent='вПє Stop camera еБЬж≠Ґ';
      $('camBtn').classList.add('red'); }).catch(function(e){ alert('Camera error: '+e); });
}
function stopCam(){ if(html5&&scanning){ html5.stop().then(function(){ scanning=false;
  $('camBtn').textContent='рЯУЈ Start camera еЉАеІЛжЙЂжПП'; $('camBtn').classList.remove('red'); }); } }
function onDecode(text){
  var now=Date.now(); if(text===lastCode && now-lastAt<3000) return;   // debounce
  lastCode=text; lastAt=now; submit(text);
}

// ---------- submit a check-in ----------
var lastSubmit=null, lastScan=null;
function submit(payload, force){
  var cp=curCp();
  if(cp.type==='hall' && !selectedHall){ beep(false); showErr('иѓЈеЕИйАЙжЛ©иЃ≤еЇІеОЕ Pick a hall first'); return; }
  lastSubmit={payload:payload, hall:selectedHall};
  gcall('recordScan',{ pass:load('pass'), payload:payload, checkpointKey:cp.key,
                       hall:selectedHall, organiser:load('orgName'), force:!!force })
    .then(render).catch(function(){ showErr('Network error, retry'); });
}
function forceLast(){ if(lastSubmit){ selectedHall=lastSubmit.hall; submit(lastSubmit.payload, true); } }
function undoLast(){ if(!lastScan) return;
  gcall('undoScan',{pass:load('pass'), id:lastScan.id, checkpointKey:lastScan.cp, organiser:load('orgName')})
    .then(function(r){ if(r.ok){ $('resultBox').innerHTML='<div class="card result dup"><div class="nm">вЖ©пЄО еЈ≤жТ§йФА Undone</div><div class="sub">'+esc(r.name)+'</div></div>'; lastScan=null; lastCode=''; }
      else showErr(r.message||r.error); }); }
function render(r){
  if(!r.ok){ beep(false);
    if(r.error==='WINDOW' && r.canForce){
      $('resultBox').innerHTML='<div class="card result dup"><div class="nm">вП∞ дЄНеЬ®жЧґжЃµ</div><div class="sub">'+esc(r.message)+'</div>'+
        '<button class="btn" style="margin-top:10px" onclick="forceLast()">дїНзДґиЃ∞ељХ Record anyway</button></div>';
    } else { showErr(r.message||r.error); }
    return; }
  var cls = r.duplicate?'dup':'ok';
  var head = r.switched ? 'рЯФБ SWITCHED еЈ≤жНҐеОЕ' : (r.duplicate ? 'вЪ†пЄП ALREADY DONE еЈ≤жК•еИ∞' : 'вЬЕ CHECKED IN жК•еИ∞жИРеКЯ');
  var html='<div class="card result '+cls+'">';
  html+='<div class="sub">'+head+'</div>';
  html+='<div class="nm">'+esc(r.name)+'</div>';
  html+='<div class="sub">'+esc(r.id)+(r.group?' ¬Ј '+esc(r.group):'')+'</div>';
  if(r.type==='room' && r.room) html+='<div class="room">рЯФС Room '+esc(r.room)+'</div>';
  else if(r.type==='room' && r.roomPending) html+='<div class="room" style="font-size:22px;color:#f9a825">рЯФС жИњеПЈжЬ™еЃЪ Room TBD'+(r.roomGroup?' ('+esc(r.roomGroup)+')':'')+'</div>';
  if(r.type==='hall' && r.hall) html+='<span class="pill hall">'+esc(r.hall)+'</span>';
  if(r.type==='checkout') html+='<div class="room">рЯФС жФґеЫЮжИњеН° Return key</div>';
  if((r.type==='room'||r.type==='checkout') && r.family>1) html+='<div class="sub">рЯС™ еРМжИњ '+r.family+' дЇЇеЈ≤дЄАиµЈзЩїиЃ∞ whole room done</div>';
  if(r.busBack && r.type==='checkout') html+='<div class="sub">рЯЪМ ињФз®ЛдєШиљ¶ вАФ remind to gather for bus</div>';
  if(r.duplicate && r.prevTime) html+='<div class="sub">first at '+r.prevTime+'</div>';
  html+='<div class="sub">'+r.time+'</div>';
  html+='<button class="btn gray" style="margin-top:10px" onclick="undoLast()">вЖ©пЄО жТ§йФА Undo (жЙЂйФЩдЇЖ?)</button>';
  html+='</div>';
  $('resultBox').innerHTML=html;
  lastScan={ id:r.id, cp:curCp().key, name:r.name };
  beep(true); if(navigator.vibrate) navigator.vibrate(r.duplicate?[60,40,60]:120);
  addRecent(r);
}
function showErr(msg){ $('resultBox').innerHTML='<div class="card result err"><div class="nm">вЬХ</div><div class="sub">'+esc(msg)+'</div></div>';
  if(navigator.vibrate) navigator.vibrate([100,50,100]); }
function addRecent(r){ var box=$('recent'); if(box.querySelector('.muted')) box.innerHTML='';
  var row=document.createElement('div'); row.className='row';
  var tag=r.switched?'рЯФБ':(r.duplicate?'вЪ†пЄП':'вЬЕ');
  row.innerHTML='<span class="t">'+r.time.slice(0,5)+'</span><span>'+tag+' '+esc(r.name)+
    (r.room&&r.type==='room'?' ¬Ј Rm '+esc(r.room):'')+(r.hall?' ¬Ј '+esc(r.hall):'')+'</span>';
  box.insertBefore(row, box.firstChild);
  while(box.children.length>15) box.removeChild(box.lastChild);
}

// ---------- manual ----------
var mt=null;
function manualSearchDebounced(){ clearTimeout(mt); mt=setTimeout(manualSearch,250); }
function manualSearch(){ var q=$('manualQ').value.trim(); if(!q){ $('manualResults').innerHTML=''; return; }
  gcall('manualSearch',{pass:load('pass'), query:q}).then(function(r){
    if(!r.ok){ $('manualResults').innerHTML='<span class="muted">auth error</span>'; return; }
    if(!r.results.length){ $('manualResults').innerHTML='<span class="muted">No match</span>'; return; }
    var h=''; r.results.forEach(function(p){
      var pl=p.id+(p.token?'-'+p.token:'');
      h+='<button class="btn gray" style="text-align:left" onclick="manualPick(\''+pl+'\')">'+
         esc(p.name)+' ¬Ј '+esc(p.id)+(p.group?' ¬Ј '+esc(p.group):'')+'</button>'; });
    $('manualResults').innerHTML=h;
  }); }
function manualPick(payload){ lastCode=''; submit(payload); $('manualQ').value=''; $('manualResults').innerHTML=''; }

// ---------- stats ----------
function openStats(){ $('statsOv').style.display='block'; $('statsBody').innerHTML='<span class="muted">LoadingвА¶</span>';
  gcall('getStats',{pass:load('pass')}).then(function(r){
    if(!r.ok){ $('statsBody').innerHTML='auth error'; return; }
    var h='<p class="muted">'+r.total+' attendees ¬Ј '+r.organisers+' organisers ¬Ј updated '+r.updated+'</p><table>';
    h+='<tr><th>Checkpoint</th><th class="n">In</th><th class="n">%</th></tr>';
    r.rows.forEach(function(x){ var pct=x.total?Math.round(x.count/x.total*100):0;
      h+='<tr><td>'+esc(x.label)+'<div class="bar"><i style="width:'+pct+'%"></i></div></td>'+
         '<td class="n">'+x.count+'</td><td class="n">'+pct+'%</td></tr>'; });
    h+='</table>';
    h+=pendingBlock('рЯЪМ еОїз®ЛжЬ™дЄКиљ¶ Bus to venue', r.busTo, 'busTo');
    h+=pendingBlock('рЯЪ© жЬ™жКµиЊЊ Not arrived (жК•еИ∞)', r.arrival, 'arrival');
    h+=pendingBlock('рЯФС жЬ™йҐЖжИњеН° No key yet (by room)', r.keyOut, 'keyOut');
    h+=pendingBlock('рЯФС жЬ™ињШжИњеН° Key not returned (by room)', r.keyReturn, 'keyRet');
    h+=pendingBlock('рЯЪМ ињФз®ЛжЬ™дЄКиљ¶ Return bus', r.busBack, 'busBack');
    h+='<h4>дЄУйҐШиЃ≤еЇІ Seminar halls</h4><table>';
    Object.keys(r.halls).forEach(function(k){ h+='<tr><td>'+esc(k)+'</td><td class="n">'+r.halls[k]+'</td></tr>'; });
    h+='</table>'; $('statsBody').innerHTML=h;
  }); }
function pendingBlock(title, o, key){
  if(!o) return '';
  var done=o.done||0, total=o.total||0, list=o.pending||[], rem=list.length;
  var h='<div style="margin-top:10px">';
  h+='<div onclick="togglePend(\''+key+'\')" style="cursor:pointer;font-weight:700;padding:9px 10px;'+
     'background:#1b1f27;border:1px solid var(--line);border-radius:10px;display:flex;align-items:center;gap:8px">'+
     '<span style="flex:1">'+esc(title)+' <span class="muted" style="font-weight:400">'+done+'/'+total+'</span></span>';
  if(rem) h+='<span style="color:#f9a825">вЦЄ '+rem+' жЬ™еЃМжИР</span>'; else h+='<span style="color:#2e7d32">вЬЕ еЃМжИР</span>';
  h+='</div>';
  h+='<div id="pend_'+key+'" style="display:none;max-height:260px;overflow:auto;border:1px solid var(--line);border-top:0;border-radius:0 0 10px 10px">';
  if(!rem) h+='<p style="color:#2e7d32;padding:8px;margin:0">вЬЕ еЕ®йГ®еЃМжИР All done</p>';
  else list.forEach(function(x){ h+='<div style="padding:5px 10px;border-bottom:1px solid var(--line)">вђЬ '+esc(x)+'</div>'; });
  return h+'</div></div>';
}
function togglePend(key){ var e=$('pend_'+key); if(e) e.style.display=(e.style.display==='none'?'block':'none'); }
function closeStats(){ $('statsOv').style.display='none'; }

// ---------- lookup ----------
var lkt=null;
function openLookup(){ $('lookupOv').style.display='block'; setTimeout(function(){$('lookupQ').focus();},50); }
function closeLookup(){ $('lookupOv').style.display='none'; }
function lookupDebounced(){ clearTimeout(lkt); lkt=setTimeout(doLookup,250); }
function doLookup(){ var q=$('lookupQ').value.trim();
  if(!q){ $('lookupBody').innerHTML='<span class="muted">иЊУеЕ• IDгАБеРНе≠ЧжИЦзїДеИЂдї•жЯ•иѓҐ</span>'; return; }
  gcall('lookupPerson',{pass:load('pass'), query:q}).then(renderLookup).catch(lookupErr); }
function filterGroup(g){ $('lookupQ').value=g;
  gcall('lookupPerson',{pass:load('pass'), exactGroup:g}).then(renderLookup).catch(lookupErr); }
function lookupErr(){ $('lookupBody').innerHTML='<span class="muted">вЪ†пЄП ињЮдЄНдЄКжЬНеК°еЩ®пЉМжИЦйГ®зљ≤жШѓжЧІзЙИжЬђпЉИиѓЈ Manage deployments вЖТ New versionпЉЙ</span>'; }
function renderLookup(r){
  if(!r.ok){ $('lookupBody').innerHTML='<span class="muted">жЯ•иѓҐе§±иі• '+esc(r.error||'')+' '+esc(r.message||'')+
    '<br>пЉИе§ЪеНКжШѓжЧІйГ®зљ≤пЉЪDeploy вЖТ Manage deployments вЖТ New versionпЉЙ</span>'; return; }
  if(!r.results.length){ $('lookupBody').innerHTML='<span class="muted">No match</span>'; return; }
  var h=''; if(r.results.length>1) h+='<div class="muted" style="margin-bottom:6px">'+r.results.length+' дЇЇ</div>';
  r.results.forEach(function(p){ h+=personCard(p); }); $('lookupBody').innerHTML=h; }
function stateChip(s){
  var m={done:['вЬЕеЈ≤з≠ЊеИ∞','#34a853'], now:['рЯЯ°ињЫи°МдЄ≠','#f9a825'], soon:['вђЬжЬ™еЉАеІЛ','#6b7280'], absent:['вЭМзЉЇеЄ≠','#c62828']};
  var x=m[s]||m.soon;
  return '<span style="font-size:11px;padding:2px 7px;border-radius:6px;background:'+x[1]+';color:#fff">'+x[0]+'</span>'; }
function personCard(p){
  var h='<div class="card"><div style="font-size:20px;font-weight:800">'+esc(p.name)+
    ' <span class="muted" style="font-size:13px">'+esc(p.id)+'</span></div>';
  if(p.phone) h+='<div class="sub">рЯУЮ <a href="tel:'+esc(p.phone)+'" style="color:#8ab4f8">'+esc(p.phone)+'</a></div>';
  if(p.emergency) h+='<div class="sub">рЯЖШ зіІжА• '+esc(p.emergency)+'</div>';
  var gtxt = p.group ? '<a onclick="filterGroup(\''+esc(p.group)+'\')" style="color:#8ab4f8;cursor:pointer">'+esc(p.group)+' вАЇ</a>' : '-';
  h+='<div class="sub">рЯФС жИњ '+esc(p.room||p.roomGroup||'-')+'  ¬Ј  рЯС• зїДеИЂ '+gtxt+'</div>';
  if(p.busTo||p.busBack) h+='<div class="sub">рЯЪМ '+(p.busTo?'еОїз®Л ':'')+(p.busBack?'ињФз®Л':'')+'</div>';
  h+='<div style="margin-top:8px">';
  (p.statuses||[]).forEach(function(s){
    h+='<div style="display:flex;gap:8px;padding:3px 0;font-size:13px;align-items:center;border-bottom:1px solid var(--line)">'+
       '<span style="flex:1">'+esc(s.label)+'</span>'+stateChip(s.state)+'</div>'; });
  return h+'</div></div>'; }

// ---------- utils ----------
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
function beep(ok){ try{ var a=new (window.AudioContext||window.webkitAudioContext)();
  var o=a.createOscillator(), g=a.createGain(); o.connect(g); g.connect(a.destination);
  o.frequency.value=ok?880:220; g.gain.value=0.08; o.start();
  setTimeout(function(){ o.stop(); a.close(); }, ok?120:260); }catch(e){} }
</script>
